
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TaskMaster</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        img {
            max-width: 100%;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #ddd;
        }
        .btn {
            display: inline-block;
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 TaskMaster</h1>
        <p>Desktop To-Do List Application | Python + Tkinter</p>
        
        <img src="images/main_window.png" alt="TaskMaster Main Window">
        
        <p><strong>Features:</strong> Add, Edit, Delete, Complete, Search, Filter, Auto-save</p>
        
        <a href="https://github.com/Emirhan-52/TaskMaster" class="btn">📂 View on GitHub</a>
        
        <footer>
            Emirhan Orcun Bayar | Riga Nordic University | 2026
        </footer>
    </div>
</body>
</html>
